version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: residencia_backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app
    networks:
      - residencia_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: residencia_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - residencia_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  residencia_net:
    driver: bridge
